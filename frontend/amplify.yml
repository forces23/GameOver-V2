version: 1
applications:
    - appRoot: frontend
      frontend:
        phases:
          preBuild:
            commands:
              - npm ci
          build:
            commands:
              - test -n "$APP_BASE_URL" && test -n "$AUTH0_DOMAIN" && test -n "$AUTH0_CLIENT_ID" && test -n "$AUTH0_CLIENT_SECRET" && test -n "$AUTH0_SECRET"
              - printenv | grep -E '^(APP_BASE_URL|AUTH0_DOMAIN|AUTH0_CLIENT_ID|AUTH0_CLIENT_SECRET|AUTH0_SECRET|AUTH0_AUDIENCE)=' >> .env.production
              - npm run build
        artifacts:
          baseDirectory: .next
          files:
            - '**/*'
        cache:
          paths:
            - node_modules/**/*
            - .next/cache/**/*
